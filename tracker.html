<div class="dynamic-tracker-wrapper">
    <details open class="dt-root-shell">
        <summary><span>{{title}}</span></summary>
        <div class="dt-toolbar" role="toolbar" aria-label="Tracker actions">
            <button type="button" class="dt-toolbar-button fa-solid fa-pen-to-square" data-dt-tracker-action="edit" title="Edit tracker"></button>
            <button type="button" class="dt-toolbar-button fa-solid fa-trash" data-dt-tracker-action="delete" title="Delete tracker"></button>
        </div>
        <div class="dt-root-content">{{content}}</div>
    </details>
</div>
<hr class="dt-divider">
